; PlatformIO Project Configuration File

[env:m5stick-c-plus2]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    m5stack/M5Unified
    m5stack/M5GFX
board_build.filesystem = littlefs
board_build.partitions = default_8MB.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_M5STICK_C_PLUS2